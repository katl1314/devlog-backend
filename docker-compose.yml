name: local-dev.log
services:
  # 로컬 개발용 인프라 (백엔드는 npm run start:dev로 직접 실행)

  postgres:
    image: postgres:15
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data # named volume
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devlog

  # SeaweedFS 오브젝트 스토리지 (S3 API 포트 8333)
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    restart: always
    command: server -s3 -s3.config=/etc/seaweedfs/s3.json -dir=/data -ip.bind=0.0.0.0
    volumes:
      - seaweedfs-data:/data
      - ../seaweedfs/s3.json:/etc/seaweedfs/s3.json
    ports:
      - '8333:8333'
      - '8888:8888' # Filer UI
      - '9333:9333' # Master UI

  opensearch:
    build: ./opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  seaweedfs-data:
